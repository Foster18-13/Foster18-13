<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notebook | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260224_v2" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <h1>Twellium Industrial Company Limited</h1>
        <p>Warehouse Daily Recording Portal</p>
        <p id="printDate" class="print-date"></p>
      </div>
      <div class="topbar-controls">
        <label for="workingDate">Working Date</label>
        <input class="input" type="date" id="workingDate" />
        <button class="button" id="jumpToday" type="button">Today</button>
        <input class="input search-input" id="globalSearchInput" placeholder="Search notes" />
        <button class="button" id="globalSearchBtn" type="button">Search</button>
        <div id="userControls" class="user-controls"></div>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <nav class="main-nav">
        <a href="home.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="balance.html">Balance Sheet</a>
        <a href="recording.html">Recording Sheet</a>
        <a href="summary.html">Summary Sheet</a>
        <a href="purchase.html">Purchase Sheet</a>
        <a href="customers.html">Customers Entry</a>
        <a href="notebook.html">Notebook</a>
        <a href="products.html">Products</a>
        <a href="account.html">Account</a>
      </nav>
    </aside>

    <main class="page">
      <section class="card">
        <h2 class="card-title">Daily Notebook</h2>
        <p class="card-subtitle">Capture notes for each workday. Notes are saved per date.</p>

        <div class="toolbar notebook-toolbar">
          <label for="note-date" class="label-bold">Note Date</label>
          <input class="input" id="note-date" type="date" />
          <button class="button button-primary" id="save-note-btn" type="button">Save Note</button>
          <button class="button" id="load-note-btn" type="button">Load Note</button>
          <span id="note-save-status" class="status"></span>
        </div>

        <div class="content-section">
          <label for="note-area" class="label-bold">Daily Record</label>
          <textarea class="textarea" id="note-area" rows="12" placeholder="Enter daily notes here..."></textarea>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/user-auth.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/cloud-sync.js"></script>
  <script src="note.js"></script>
  <script>
    // Setup user controls in header
    firebase.auth().onAuthStateChanged((user) => {
      const userControls = document.getElementById('userControls');
      if (user) {
        userControls.innerHTML = `
          <span class="welcome-text">Welcome, <strong>${user.displayName || user.email}</strong></span>
          <button class="button" onclick="logoutUser()">Logout</button>
        `;
      }
    });
  </script>
</body>

</html>
