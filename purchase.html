<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase | Foster18-13 Portal</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="summary.html">Summary</a>
    <a href="returns.html">Returns</a>
    <a href="purchase.html" class="active">Purchase</a>
    <a href="#" onclick="toggleDark()" style="margin-left:auto;">🌓</a>
  </nav>
  <div class="main-content">
    <div class="card glass">
      <div class="heading">Goods Purchased</div>
      <form id="addPurchaseForm" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
        <input id="supplierName" type="text" placeholder="Supplier name" required />
        <input id="productName" type="text" placeholder="Product" required />
        <input id="qty" type="number" min="1" placeholder="Qty" required />
        <input id="waybill" type="text" placeholder="Waybill No." required />
        <button class="button" type="submit">Add Purchase</button>
      </form>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--surface);">
            <th style="text-align:left;padding:10px 8px;">Supplier</th>
            <th style="text-align:left;padding:10px 8px;">Product</th>
            <th style="text-align:right;padding:10px 8px;">Qty</th>
            <th style="text-align:left;padding:10px 8px;">Waybill</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="purchaseTableBody">
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script>
    // Demo: In-memory purchases data
    let purchases = [
      { supplier: "Factory A", product: "Water", qty: 20, waybill: "WB200" },
      { supplier: "Factory B", product: "Juice", qty: 12, waybill: "WB201" }
    ];
    function renderPurchases() {
      const tbody = document.getElementById('purchaseTableBody');
      if (!purchases.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No purchases yet.</td></tr>';
        return;
      }
      tbody.innerHTML = purchases.map((r, i) => `<tr><td style='padding:8px;'>${r.supplier}</td><td style='padding:8px;'>${r.product}</td><td style='padding:8px;text-align:right;'>${r.qty}</td><td style='padding:8px;'>${r.waybill}</td><td><button class='button' style='background:#ef4444;' onclick='removePurchase(${i})'>Remove</button></td></tr>`).join('');
    }
    window.removePurchase = function (idx) {
      purchases.splice(idx, 1); renderPurchases(); showToast('Purchase removed', 'error');
    };
    document.getElementById('addPurchaseForm').onsubmit = function (e) {
      e.preventDefault();
      const s = document.getElementById('supplierName').value.trim();
      const p = document.getElementById('productName').value.trim();
      const q = parseInt(document.getElementById('qty').value, 10);
      const w = document.getElementById('waybill').value.trim();
      if (s && p && q && w) { purchases.push({ supplier: s, product: p, qty: q, waybill: w }); renderPurchases(); showToast('Purchase added!', 'success'); }
      this.reset();
    };
    renderPurchases();
  </script>
</body>

</html>
