<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Sheet | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.cleaned.css?v=20260317a" />
</head>

<body>
  <div class="wallpaper-4d" aria-hidden="true"></div>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">Purchase Sheet</div>
      <div class="topbar-controls">
        <label for="workingDate">Working Date</label>
        <input id="workingDate" class="input" type="date" />
        <span>Sector: <strong id="sectorLabel">-</strong></span>
        <span>User: <strong id="userLabel">-</strong></span>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="false">Menu</button>
      </div>
    </div>
  </header>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside class="sidebar">
    <nav>
      <a data-page="dashboard.html" href="dashboard.html">Dashboard</a>
      <a data-page="balance.html" href="balance.html">Balance Sheet</a>
      <a data-page="recording.html" href="recording.html">Customer Entry Sheet</a>
      <a data-page="summary.html" href="summary.html">Summary Sheet</a>
      <a data-page="returns.html" href="returns.html">Goods Returned Sheet</a>
      <a data-page="purchase.html" href="purchase.html">Purchase Sheet</a>
      <a data-page="dispatch.html" href="dispatch.html">Product Dispatch</a>
      <a data-page="products.html" href="products.html">Products</a>
      <a data-page="sector-select.html" href="sector-select.html">Switch Sector</a>
    </nav>
  </aside>

  <main class="layout">
    <section class="card">
      <h2>Goods Received From Factory</h2>
      <form id="purchaseForm" class="toolbar">
        <label for="purchaseProduct">Product</label>
        <select id="purchaseProduct" class="input" title="Product"></select>
        <label for="waybillNo">Waybill Number</label>
        <input id="waybillNo" class="input" placeholder="Waybill Number" required />
        <label for="batchCode">Batch Code</label>
        <input id="batchCode" class="input" placeholder="Batch Code" required />
        <label for="pallets">No. of Pallets</label>
        <input id="pallets" class="input" type="number" min="0" step="1" placeholder="No. of Pallets" required />
        <label for="dateReceived">Date Received</label>
        <input id="dateReceived" class="input" type="date" title="Date Received" required />
        <button class="button primary" type="submit">Add Entry</button>
      </form>
      <div id="purchaseTableHost"></div>
    </section>
  </main>

  <script src="assets/js/auth.js?v=20260316w"></script>
  <script src="assets/js/data-store.js?v=20260316w"></script>
  <script src="assets/js/sidebar.js?v=20260316q"></script>
  <script src="assets/js/app.js?v=20260317d"></script>
  <script src="assets/js/page-purchase.js?v=20260316q"></script>
  <script>
    initPurchasePage();
    initDateControl(renderPurchaseTable);
  </script>
    <script src="assets/js/toast.js"></script>
  <script src="assets/js/wallpaper-4d.js"></script>
</body>

</html>
