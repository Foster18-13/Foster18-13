<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recording Sheet | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260316r" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">Recording Sheet</div>
      <div class="topbar-controls">
        <label for="workingDate">Working Date</label>
        <input id="workingDate" class="input" type="date" />
        <span>Sector: <strong id="sectorLabel">-</strong></span>
        <span>User: <strong id="userLabel">-</strong></span>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="false">Menu</button>
      </div>
    </div>
  </header>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside class="sidebar">
    <nav>
      <a data-page="dashboard.html" href="dashboard.html">Dashboard</a>
      <a data-page="balance.html" href="balance.html">Balance Sheet</a>
      <a data-page="recording.html" href="recording.html">Recording Sheet</a>
      <a data-page="summary.html" href="summary.html">Summary Sheet</a>
      <a data-page="purchase.html" href="purchase.html">Purchase Sheet</a>
      <a data-page="products.html" href="products.html">Products</a>
      <a data-page="settings.html" href="settings.html">Settings</a>
      <a data-page="sector-select.html" href="sector-select.html">Switch Sector</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </aside>

  <main class="layout">
    <section class="card">
      <h2>Daily Recording Sheet</h2>
      <p>Add unlimited columns as needed. Loading is auto-generated from each row total.</p>
      <div class="toolbar">
        <button id="addColumnBtn" class="button primary" type="button">Add Column</button>
      </div>
      <div id="recordingTableHost"></div>
    </section>
  </main>

  <script src="assets/js/auth.js?v=20260316q"></script>
  <script src="assets/js/data-store.js?v=20260316q"></script>
  <script src="assets/js/sidebar.js?v=20260316q"></script>
  <script src="assets/js/app.js?v=20260316q"></script>
  <script src="assets/js/page-recording.js?v=20260316q"></script>
  <script>
    initRecordingPage();
    initDateControl(renderRecordingTable);
  </script>
</body>

</html>
