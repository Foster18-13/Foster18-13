<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance Sheet | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.cleaned.css?v=20260317a" />
</head>

<body>
  
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">Balance Sheet</div>
      <div class="topbar-controls">
        <label for="workingDate">Working Date</label>
        <input id="workingDate" class="input" type="date" />
        <span>Sector: <strong id="sectorLabel">-</strong></span>
        <span>User: <strong id="userLabel">-</strong></span>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="false">Menu</button>
      </div>
    </div>
  </header>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside class="sidebar">
    <nav>
      <a data-page="dashboard.html" href="dashboard.html">Dashboard</a>
      <a data-page="balance.html" href="balance.html">Balance Sheet</a>
      <a data-page="recording.html" href="recording.html">Customer Entry Sheet</a>
      <a data-page="summary.html" href="summary.html">Summary Sheet</a>
      <a data-page="returns.html" href="returns.html">Goods Returned Sheet</a>
      <a data-page="purchase.html" href="purchase.html">Purchase Sheet</a>
      <a data-page="dispatch.html" href="dispatch.html">Product Dispatch</a>
      <a data-page="products.html" href="products.html">Products</a>
      <a data-page="sector-select.html" href="sector-select.html">Switch Sector</a>
    </nav>
  </aside>

  <main class="layout">
    <section class="card">
      <h2 class="heading-red">Daily Balance Sheet</h2>
      <p>Formula: Balance = Opening Stock + Goods Returned + Goods Received - Goods Delivered - Goods Damaged.</p>
      <div class="toolbar">
        <button id="printBalanceBtn" class="button" type="button">Export PDF</button>
        <button class="button" id="exportCsvBtn" type="button" style="display:none;">Export CSV</button>
        <button class="button" id="importCsvBtn" type="button">Import CSV</button>
        <input type="file" id="importCsvInput" accept=".csv" style="display:none;" />
      </div>
      <div id="balanceTableHost"></div>
    </section>
  </main>

  <button id="darkModeToggle" class="button" type="button"
    style="position:fixed;top:18px;right:18px;z-index:3000;">🌙</button>

  <script src="assets/js/auth.js?v=20260316w"></script>
  <script src="assets/js/data-store.js?v=20260316z"></script>
  <script src="assets/js/sidebar.js?v=20260316q"></script>
  <script src="assets/js/app.js?v=20260317d"></script>
  <script src="assets/js/page-balance.js?v=20260317a"></script>
  <script>
    initBalancePage();
    initDateControl(renderBalanceSheet);
  </script>
  <script src="assets/js/table-search.js"></script>
  <script src="assets/js/table-export.js"></script>
  <script src="assets/js/table-import.js"></script>
  <script src="assets/js/toast.js"></script>
  
  <script>
    // Export CSV logic
    const exportBtn = document.getElementById('exportCsvBtn');
    const tableHost = document.getElementById('balanceTableHost');
    function updateExportBtnVisibility() {
      exportBtn.style.display = tableHost.querySelector('table') ? '' : 'none';
    }
    // Show/hide export button on load and after rendering
    window.addEventListener('DOMContentLoaded', updateExportBtnVisibility);
    if (window.renderBalanceSheet) {
      const origRender = window.renderBalanceSheet;
      window.renderBalanceSheet = function () {
        origRender.apply(this, arguments);
        updateExportBtnVisibility();
      };
    }
    exportBtn.addEventListener('click', function () {
      const table = tableHost.querySelector('table');
      if (table) {
        exportTableToCSV(table);
        showToast('Table exported as CSV!', 'success');
      } else {
        showToast('No table to export.', 'error');
      }
    });

    // Import CSV logic
    const importBtn = document.getElementById('importCsvBtn');
    const importInput = document.getElementById('importCsvInput');
    importBtn.addEventListener('click', function () {
      importInput.click();
    });
    importInput.addEventListener('change', function () {
      const file = importInput.files[0];
      if (file) {
        importCSVToTable(file, tableHost, function () {
          exportBtn.style.display = '';
          showToast('CSV imported successfully!', 'success');
        }, function (err) {
          showToast('Import failed: ' + (err && err.message ? err.message : err), 'error');
        });
      }
    });

    // Dark mode toggle
    const darkToggle = document.getElementById('darkModeToggle');
    function setDarkMode(on) {
      document.documentElement.classList.toggle('dark-mode', on);
      localStorage.setItem('darkMode', on ? '1' : '0');
      darkToggle.textContent = on ? '☀️' : '🌙';
    }
    darkToggle.addEventListener('click', function () {
      setDarkMode(!document.documentElement.classList.contains('dark-mode'));
    });
    // Init from system or saved
    const darkPref = localStorage.getItem('darkMode');
    if (darkPref === '1' || (darkPref === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setDarkMode(true);
    }
  </script>
</body>

</html>
