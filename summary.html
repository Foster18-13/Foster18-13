<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summary | Foster18-13 Portal</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="summary.html" class="active">Summary</a>
    <a href="returns.html">Returns</a>
    <a href="purchase.html">Purchase</a>
    <a href="#" onclick="toggleDark()" style="margin-left:auto;">🌓</a>
  </nav>
  <div class="main-content">
    <div class="card glass">
      <div class="heading">Stock Summary</div>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--surface);">
            <th style="text-align:left;padding:10px 8px;">Product</th>
            <th style="text-align:right;padding:10px 8px;">Available</th>
            <th style="text-align:right;padding:10px 8px;">Unit</th>
          </tr>
        </thead>
        <tbody id="summaryTableBody">
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script>
    // Demo: In-memory summary data
    const summaryData = [
      { product: "Water 1.5L", available: 120, unit: "bottles" },
      { product: "Juice 500ml", available: 80, unit: "packs" },
      { product: "Soda 330ml", available: 60, unit: "cans" }
    ];
    function renderSummary() {
      const tbody = document.getElementById('summaryTableBody');
      tbody.innerHTML = summaryData.map(row => `<tr><td style='padding:8px;'>${row.product}</td><td style='padding:8px;text-align:right;'>${row.available}</td><td style='padding:8px;text-align:right;'>${row.unit}</td></tr>`).join('');
    }
    renderSummary();
  </script>
</body>

</html>
