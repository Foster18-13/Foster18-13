<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returns | Foster18-13 Portal</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="summary.html">Summary</a>
    <a href="returns.html" class="active">Returns</a>
    <a href="purchase.html">Purchase</a>
    <a href="#" onclick="toggleDark()" style="margin-left:auto;">🌓</a>
  </nav>
  <div class="main-content">
    <div class="card glass">
      <div class="heading">Goods Returned</div>
      <form id="addReturnForm" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
        <input id="customerName" type="text" placeholder="Customer name" required />
        <input id="productName" type="text" placeholder="Product" required />
        <input id="qty" type="number" min="1" placeholder="Qty" required />
        <input id="waybill" type="text" placeholder="Waybill No." required />
        <button class="button" type="submit">Add Return</button>
      </form>
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--surface);">
            <th style="text-align:left;padding:10px 8px;">Customer</th>
            <th style="text-align:left;padding:10px 8px;">Product</th>
            <th style="text-align:right;padding:10px 8px;">Qty</th>
            <th style="text-align:left;padding:10px 8px;">Waybill</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="returnsTableBody">
        </tbody>
      </table>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script>
    // Demo: In-memory returns data
    let returns = [
      { customer: "Alpha", product: "Water", qty: 10, waybill: "WB123" },
      { customer: "Bravo", product: "Juice", qty: 5, waybill: "WB124" }
    ];
    function renderReturns() {
      const tbody = document.getElementById('returnsTableBody');
      if (!returns.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-muted">No returns yet.</td></tr>';
        return;
      }
      tbody.innerHTML = returns.map((r,i) => `<tr><td style='padding:8px;'>${r.customer}</td><td style='padding:8px;'>${r.product}</td><td style='padding:8px;text-align:right;'>${r.qty}</td><td style='padding:8px;'>${r.waybill}</td><td><button class='button' style='background:#ef4444;' onclick='removeReturn(${i})'>Remove</button></td></tr>`).join('');
    }
    window.removeReturn = function(idx) {
      returns.splice(idx,1); renderReturns(); showToast('Return removed','error');
    };
    document.getElementById('addReturnForm').onsubmit = function(e) {
      e.preventDefault();
      const c = document.getElementById('customerName').value.trim();
      const p = document.getElementById('productName').value.trim();
      const q = parseInt(document.getElementById('qty').value,10);
      const w = document.getElementById('waybill').value.trim();
      if(c && p && q && w) { returns.push({customer:c,product:p,qty:q,waybill:w}); renderReturns(); showToast('Return added!','success'); }
      this.reset();
    };
    renderReturns();
  </script>
</body>

</html>
