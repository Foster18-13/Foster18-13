<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Sector | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260317a" />
</head>

<body>
  <div class="morph-bg" aria-hidden="true">
    <span class="morph-blob morph-blob--1"></span>
    <span class="morph-blob morph-blob--2"></span>
    <span class="morph-blob morph-blob--3"></span>
  </div>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">Twellium Warehouse Portal</div>
      <button class="button" onclick="logoutUser()">Reset Session</button>
    </div>
  </header>

  <main class="sector-select-main">
    <div class="sector-select-hero">
      <p class="eyebrow">Twellium Industrial Company Limited</p>
      <h1 class="heading-white">Select Your Sector</h1>
      <p>Choose the sector you are managing to begin your session.</p>
    </div>

    <div class="sector-card-grid" id="sectorGrid">

      <button class="sector-card sector-water" data-sector="water">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon" aria-hidden="true">W</span>
        <div class="sector-card-body">
          <strong>Water &amp; Beverages</strong>
          <p>Water and beverage product inventory</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>
      <button class="sector-card sector-water" data-sector="water" tabindex="0"
        aria-label="Select Water & Beverages sector" title="Water and beverage product inventory">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon sector-icon-lg" aria-hidden="true">💧</span>
        <div class="sector-card-body">
          <strong>Water &amp; Beverages</strong>
          <p>Water and beverage product inventory</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>

      <button class="sector-card sector-hh" data-sector="hh">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon" aria-hidden="true">H</span>
        <div class="sector-card-body">
          <strong>H&amp;H</strong>
          <p>Household and hardware products</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>
      <button class="sector-card sector-hh" data-sector="hh" tabindex="0" aria-label="Select H&H sector"
        title="Household and hardware products">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon sector-icon-lg" aria-hidden="true">🏠</span>
        <div class="sector-card-body">
          <strong>H&amp;H</strong>
          <p>Household and hardware products</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>

      <button class="sector-card sector-mcberry" data-sector="mcberry">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon" aria-hidden="true">M</span>
        <div class="sector-card-body">
          <strong>McBerry</strong>
          <p>McBerry product line management</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>
      <button class="sector-card sector-mcberry" data-sector="mcberry" tabindex="0" aria-label="Select McBerry sector"
        title="McBerry product line management">
        <span class="sector-card-stripe" aria-hidden="true"></span>
        <span class="sector-card-icon sector-icon-lg" aria-hidden="true">🍪</span>
        <div class="sector-card-body">
          <strong>McBerry</strong>
          <p>McBerry product line management</p>
          <span class="sector-active-badge" hidden>Current Session</span>
        </div>
        <span class="sector-card-chevron" aria-hidden="true">&#8250;</span>
      </button>

    </div>
  </main>

  <script src="assets/js/auth.js?v=20260316w"></script>
  <script src="assets/js/data-store.js?v=20260316w"></script>
  <script src="assets/js/app.js?v=20260317d"></script>
  <script>
    initSectorPage();
    // Keyboard navigation and animated selection
    document.querySelectorAll('.sector-card').forEach(card => {
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          card.click();
        }
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          let next = card.nextElementSibling;
          if (next && next.classList.contains('sector-card')) next.focus();
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          let prev = card.previousElementSibling;
          if (prev && prev.classList.contains('sector-card')) prev.focus();
        }
      });
      card.addEventListener('focus', () => {
        card.classList.add('sector-focus');
      });
      card.addEventListener('blur', () => {
        card.classList.remove('sector-focus');
      });
    });
  </script>
</body>
