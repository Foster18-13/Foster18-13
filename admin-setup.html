<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Setup | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260316f" />
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <img src="assets/images/logo.png" alt="TWI DZW Logo" class="logo">
        <div class="brand-text">
          <h1>Twellium Industrial Company Limited Accra Branch (Dzorwulu)</h1>
          <p>Warehouse Daily Recording Portal</p>
        </div>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <main class="page admin-setup-page">
      <section class="card">
        <h2 class="card-title">Admin Setup</h2>
        <p class="card-subtitle">Set the first administrator for this warehouse portal</p>

        <div id="setupStatus" class="status"></div>
        <div id="setupError" class="status error display-none"></div>
        <div id="setupSuccess" class="status ok display-none"></div>

        <div id="setupForm">
          <div class="form-group">
            <label for="adminEmail" class="form-label">Admin Email Address</label>
            <input class="input" type="email" id="adminEmail" placeholder="admin@example.com" required />
            <small class="helper-small-muted">
              Enter the email of an existing registered user to promote them to admin
            </small>
          </div>

          <div class="button-group">
            <button class="button button-primary" id="setAdminBtn" type="button">Set as Admin</button>
            <a class="button" href="home.html">Cancel</a>
          </div>

          <hr class="section-divider-line" />

          <h3 class="section-subtitle-small">All Registered Users</h3>
          <div id="usersList" class="users-scroll-box">
            Loading users...
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/user-auth.js?v=20260316d"></script>

  <script>
    function showMessage(message, type = 'status') {
      const statusDiv = document.getElementById('setupStatus');
      const errorDiv = document.getElementById('setupError');
      const successDiv = document.getElementById('setupSuccess');

      statusDiv.style.display = 'none';
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (type === 'error') {
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
      } else if (type === 'success') {
        successDiv.textContent = message;
        successDiv.style.display = 'block';
      } else {
        statusDiv.textContent = message;
        statusDiv.style.display = 'block';
      }
    }

    async function loadUsers() {
      const usersList = document.getElementById('usersList');
      try {
        const snapshot = await firebase.firestore().collection('users').limit(100).get();
        if (snapshot.empty) {
          usersList.innerHTML = '<p style="color: var(--text-muted);">No users registered yet. Users must register first before becoming admin.</p>';
          return;
        }

        const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        users.sort((a, b) => (a.email || '').localeCompare(b.email || ''));

        usersList.innerHTML = users.map(user => {
          let roleLabel = 'Clerk';
          if (user.role === 'admin') roleLabel = 'Admin';
          else if (user.role === 'supervisor') roleLabel = 'Supervisor';

          let roleClass = '';
          if (user.role === 'admin') roleClass = 'ok';
          else if (user.role === 'supervisor') roleClass = 'error';

          return `
            <div style="padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${user.email || user.username || user.id}</strong>
                <br />
                <small style="color: var(--text-muted);">${user.username || ''}</small>
              </div>
              <span class="status ${roleClass}" style="padding: 4px 8px; font-size: 11px;">${roleLabel}</span>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Failed to load users:', error);
        usersList.innerHTML = '<p style="color: var(--danger);">Failed to load users</p>';
      }
    }

    async function setAdmin() {
      const emailInput = document.getElementById('adminEmail');
      const email = emailInput.value.trim().toLowerCase();

      if (!email) {
        showMessage('Please enter an email address', 'error');
        return;
      }

      const setAdminBtn = document.getElementById('setAdminBtn');
      setAdminBtn.disabled = true;
      setAdminBtn.textContent = 'Setting admin...';

      try {
        // Find user by email
        const snapshot = await firebase.firestore()
          .collection('users')
          .where('email', '==', email)
          .limit(1)
          .get();

        if (snapshot.empty) {
          showMessage(`No user found with email: ${email}. Make sure they have registered first.`, 'error');
          setAdminBtn.disabled = false;
          setAdminBtn.textContent = 'Set as Admin';
          return;
        }

        const userDoc = snapshot.docs[0];
        const userId = userDoc.id;

        // Update user role to admin
        await firebase.firestore().collection('users').doc(userId).update({
          role: 'admin',
          updatedAt: new Date().toISOString()
        });

        showMessage(`✓ Successfully set ${email} as admin!`, 'success');
        emailInput.value = '';

        // Reload user list
        await loadUsers();

        // Redirect after 2 seconds
        setTimeout(() => {
          globalThis.location.href = 'home.html';
        }, 2000);

      } catch (error) {
        console.error('Failed to set admin:', error);
        showMessage('Failed to set admin: ' + error.message, 'error');
        setAdminBtn.disabled = false;
        setAdminBtn.textContent = 'Set as Admin';
      }
    }

    // Initialize
    firebase.auth().onAuthStateChanged((user) => {
      if (!user) {
        showMessage('Please log in first to set up admin', 'error');
        setTimeout(() => {
          globalThis.location.href = 'login.html';
        }, 2000);
        return;
      }

      loadUsers();

      const setAdminBtn = document.getElementById('setAdminBtn');
      if (setAdminBtn) {
        setAdminBtn.addEventListener('click', setAdmin);
      }
    });
  </script>
</body>

</html>
