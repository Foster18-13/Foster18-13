<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product</title>
</head>

<body>
  <h2>Adding Product...</h2>
  <div id="status"></div>

  <script src="assets/js/storage.js?v=20260316e"></script>
  <script>
    const productName = "bigoo lemonade 350ml x 20";
    const result = addProduct(productName);

    const statusDiv = document.getElementById('status');
    if (result.ok) {
      statusDiv.innerHTML = `<p class="text-success">✓ Successfully added: ${productName}</p>
        <p><a href="products.html">Go to Products page</a></p>`;
    } else {
      statusDiv.innerHTML = `<p class="text-error">Error: ${result.message}</p>
        <p><a href="products.html">Go to Products page</a></p>`;
    }
  </script>
</body>

</html>
