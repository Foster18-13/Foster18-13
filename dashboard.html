<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Foster18-13 Portal</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="summary.html">Summary</a>
    <a href="returns.html">Returns</a>
    <a href="purchase.html">Purchase</a>
    <a href="#" onclick="toggleDark()" style="margin-left:auto;">🌓</a>
  </nav>
  <div class="main-content">
    <div class="card glass">
      <div class="heading">Warehouse Dashboard</div>
      <div style="display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 24px;">
        <div class="card glass" style="flex:1; min-width:180px;">
          <div class="text-muted">Products Tracked</div>
          <div style="font-size:2.2rem;font-weight:800;">128</div>
        </div>
        <div class="card glass" style="flex:1; min-width:180px;">
          <div class="text-muted">Customer Entries</div>
          <div style="font-size:2.2rem;font-weight:800;">54</div>
        </div>
        <div class="card glass" style="flex:1; min-width:180px;">
          <div class="text-muted">Goods Returned</div>
          <div style="font-size:2.2rem;font-weight:800;">17</div>
        </div>
        <div class="card glass" style="flex:1; min-width:180px;">
          <div class="text-muted">Purchases Logged</div>
          <div style="font-size:2.2rem;font-weight:800;">23</div>
        </div>
      </div>
      <button class="button" onclick="showToast('Demo: Dashboard loaded!')">Show Toast</button>
    </div>
    <div class="card glass">
      <div class="heading">Quick Actions</div>
      <div style="display:flex;gap:18px;flex-wrap:wrap;">
        <a class="button" href="products.html">Manage Products</a>
        <a class="button" href="returns.html">Log Returns</a>
        <a class="button" href="purchase.html">Add Purchase</a>
        <a class="button" href="summary.html">View Summary</a>
      </div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
</body>

</html>
