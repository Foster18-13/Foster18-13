<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
</head>

<body>
  <script>
    (function () {
      const knownRoutes = new Set([
        'access',
        'account',
        'add-product',
        'admin-setup',
        'balance',
        'customer-history',
        'customers',
        'damages',
        'dashboard',
        'force-admin-init',
        'home',
        'login',
        'notebook',
        'period-reports',
        'product-movement',
        'products',
        'profile',
        'purchase',
        'register',
        'reports',
        'reset-products',
        'returns',
        'saved-sheets',
        'summary',
        'vehicles'
      ]);

      const path = String(location.pathname || '/');
      const trimmed = path.replace(/\/+$/, '');
      const route = trimmed.split('/').pop();

      if (route && knownRoutes.has(route.toLowerCase())) {
        // Redirect without query strings to prevent URI bloat
        location.replace('/' + route + '.html');
        return;
      }

      location.replace('/index.html');
    })();
  </script>
  Redirecting...
</body>

</html>
