<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Twellium Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260317a" />
</head>

<body>
  <div class="morph-bg" aria-hidden="true">
    <span class="morph-blob morph-blob--1"></span>
    <span class="morph-blob morph-blob--2"></span>
    <span class="morph-blob morph-blob--3"></span>
  </div>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">Products Setup</div>
      <div class="topbar-controls">
        <label for="workingDate">Working Date</label>
        <input id="workingDate" class="input" type="date" />
        <span>Sector: <strong id="sectorLabel">-</strong></span>
        <span>User: <strong id="userLabel">-</strong></span>
        <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-expanded="false">Menu</button>
      </div>
    </div>
  </header>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside class="sidebar">
    <nav>
      <a data-page="dashboard.html" href="dashboard.html">Dashboard</a>
      <a data-page="balance.html" href="balance.html">Balance Sheet</a>
      <a data-page="recording.html" href="recording.html">Customer Entry Sheet</a>
      <a data-page="summary.html" href="summary.html">Summary Sheet</a>
      <a data-page="returns.html" href="returns.html">Returns Sheet</a>
      <a data-page="purchase.html" href="purchase.html">Purchase Sheet</a>
      <a data-page="dispatch.html" href="dispatch.html">Product Dispatch</a>
      <a data-page="products.html" href="products.html">Products</a>
      <a data-page="sector-select.html" href="sector-select.html">Switch Sector</a>
    </nav>
  </aside>

  <main class="layout">
    <section class="card">
      <h2>Products Management</h2>
      <div class="toolbar">
        <input id="newProductName" class="input" type="text" placeholder="New product name" />
        <button id="addProductBtn" class="button primary" type="button">Add Product</button>
      </div>
      <div id="productsList"></div>
    </section>
  </main>

  <script src="assets/js/auth.js?v=20260316w"></script>
  <script src="assets/js/data-store.js?v=20260316w"></script>
  <script src="assets/js/sidebar.js?v=20260316q"></script>
  <script src="assets/js/app.js?v=20260316w"></script>
  <script src="assets/js/page-products.js?v=20260316q"></script>
  <script>
    initProductsPage();
    initDateControl();
  </script>
</body>

</html>
