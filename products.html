<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products | Foster18-13 Portal</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html" class="active">Products</a>
    <a href="summary.html">Summary</a>
    <a href="returns.html">Returns</a>
    <a href="purchase.html">Purchase</a>
    <a href="#" onclick="toggleDark()" style="margin-left:auto;">🌓</a>
  </nav>
  <div class="main-content">
    <div class="card glass">
      <div class="heading">Products Management</div>
      <form id="addProductForm" style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;">
        <input id="newProductName" type="text" placeholder="New product name" required />
        <button class="button" type="submit">Add Product</button>
      </form>
      <div id="productsList" style="margin-top:18px;"></div>
    </div>
  </div>
  <script src="assets/js/main.js"></script>
  <script>
    // Demo: In-memory product list
    let products = ["Water 1.5L", "Juice 500ml", "Soda 330ml"];
    function renderProducts() {
      const list = document.getElementById('productsList');
      if (!products.length) {
        list.innerHTML = '<div class="text-muted">No products yet.</div>';
        return;
      }
      list.innerHTML = products.map((p, i) => `<div class='glass' style='display:flex;align-items:center;justify-content:space-between;padding:12px 18px;margin-bottom:8px;'><span>${p}</span><button class='button' style='background:#ef4444;' onclick='removeProduct(${i})'>Remove</button></div>`).join('');
    }
    window.removeProduct = function (idx) {
      products.splice(idx, 1); renderProducts(); showToast('Product removed', 'error');
    };
    document.getElementById('addProductForm').onsubmit = function (e) {
      e.preventDefault();
      const val = document.getElementById('newProductName').value.trim();
      if (val) { products.push(val); renderProducts(); showToast('Product added!', 'success'); }
      this.reset();
    };
    renderProducts();
  </script>
</body>

</html>
