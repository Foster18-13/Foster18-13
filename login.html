<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Warehouse Portal</title>
  <link rel="stylesheet" href="assets/css/style.css?v=20260316a" />
</head>

<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <h1>Warehouse Portal Login</h1>
      <p id="authMessage" class="auth-message"></p>
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <button id="submitBtn" class="button primary" type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="assets/js/firebase-config.js?v=20260316a"></script>
  <script src="assets/js/auth.js?v=20260316a"></script>
  <script src="assets/js/app.js?v=20260316a"></script>
  <script>initLoginPage();</script>
</body>

</html>
